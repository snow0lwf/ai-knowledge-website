<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=knowledge_complete.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在跳转... - AI通识知识库</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #F8F9FA;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #5F6368;
        }
        .message {
            text-align: center;
        }
        .spinner {
            border: 3px solid #E8EAED;
            border-top: 3px solid #1A73E8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="message">
        <div class="spinner"></div>
        <p>正在跳转到最新版知识库...</p>
        <p><a href="knowledge_complete.html">如未自动跳转，请点击这里</a></p>
    </div>
    <script>
        window.location.href = 'knowledge_complete.html';
    </script>
</body>
</html>
