            color: var(--primary);
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 10px;
        }
        
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .news-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        
        .news-card h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: var(--text);
        }
        
        .news-card p {
